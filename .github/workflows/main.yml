jobs:
  run-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run my script
        # This is where the magic happens
        env:
          MY_API_KEY: ${{ secrets.API_KEY }}
        run: python t.py

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run script
        env:
          # This line maps the GitHub Secret to a local environment variable
          API_KEY: ${{ secrets.API_KEY }}
          API_KEYV: ${{ secrets.API_KEYV }}

        run: python t.py
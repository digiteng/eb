name: secrets
on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Python script
        env:
          api_key: ${{ secrets.API_KEY }} 
        run: | 
            pip istall requests
            python a.py

      - name: Show admin password
        run: echo ${{ secrets.API_KEY }}

      - name: Check admin password content
        run: |
          if [ "${{ secrets.API_KEY }}" == "12345" ]; then
            echo "Admin password is 12345"
          else
            echo "Admin password is not 12345"
          fi
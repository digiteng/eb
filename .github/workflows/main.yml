jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install all necessary packages
        run: pip install requests os
      - name: Run script
        env:
          # This line maps the GitHub Secret to a local environment variable
          API_KEY: ${{ secrets.API_KEY }}
        run: python t.py


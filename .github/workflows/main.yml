name: scrape
on:
  workflow_dispatch:
  schedule:
	- cron: '*/20 * * * *'
jobs:
  scrape:
	runs-on: ubuntu-latest
	steps:
	  - name: Check out this repo
		uses: actions/checkout@v2
	  - name: Set up Python
		uses: actions/setup-python@v2
		with:
		  python-version: '3.9'
	  - name: Install all necessary packages
		run: pip install requests os
	  - name: Run the scraping script
		run: python t.py

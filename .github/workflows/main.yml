jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run my script
        # This maps the GitHub Secret to an environment variable
        env:
          API_KEY: ${{ secrets.MY_API_KEY }}
        run: python t.py


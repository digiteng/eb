jobs:
  run-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run script
        env:
          # This maps the GitHub secret to a system environment variable
          api_key: ${{ secrets.API_KEY }}
        run: python t.py

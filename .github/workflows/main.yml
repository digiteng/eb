
name: Python Application

on: [push]

jobs:
  build:
    environment: TEST_SECRET
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'

    - name: Run Python script
      env:
        API_KEY: ${{ secrets.API_KEY }}
      run: |
        pip install requests
        python a.py

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Python script
        env:
          # This maps the GitHub Secret to a local environment variable
          PYTHON_SECRET_KEY: ${{ secrets.API_KEY }} 
        run: python my_script.py
